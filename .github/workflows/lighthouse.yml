name: Lighthouse CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v4
        with:
          version: 10
          
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          
      - name: Install dependencies
        run: pnpm install
        
      - name: Build site
        run: pnpm run build
        
      - name: Run Lighthouse CI
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.cjs
          uploadArtifacts: true
          temporaryPublicStorage: true
          
      - name: Format Lighthouse Results
        if: always()
        run: |
          echo "## Lighthouse CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Lighthouse CI has run. Check the uploaded artifacts for detailed HTML reports." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Threshold Settings:**" >> $GITHUB_STEP_SUMMARY
          echo "- Performance: >= 0.75 (warn)" >> $GITHUB_STEP_SUMMARY
          echo "- Accessibility: >= 0.85 (warn)" >> $GITHUB_STEP_SUMMARY
          echo "- Best Practices: >= 0.75 (warn)" >> $GITHUB_STEP_SUMMARY
          echo "- SEO: >= 0.9 (error)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          # Try to show links to HTML reports if available
          if [ -d ".lighthouseci" ]; then
            echo "**Report Files:**" >> $GITHUB_STEP_SUMMARY
            find .lighthouseci -name "*.html" 2>/dev/null | while read file; do
              echo "- $file" >> $GITHUB_STEP_SUMMARY
            done
          fi
          
      - name: Add Lighthouse Comment (PR only)
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: lighthouse
          message: |
            ## Lighthouse CI Results
            Check the [GitHub Actions run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for full Lighthouse reports.
            
            Threshold settings:
            - Performance: >= 0.75 (warn)
            - Accessibility: >= 0.85 (warn)
            - Best Practices: >= 0.75 (warn)
            - SEO: >= 0.9 (error)
