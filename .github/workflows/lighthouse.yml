name: Lighthouse CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup pnpm
        run: corepack enable && corepack prepare pnpm@10 --activate
          
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          
      - name: Install dependencies
        run: pnpm install
        
      - name: Build site
        run: pnpm run build:full
        
      - name: Run Lighthouse CI
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.cjs
          uploadArtifacts: true
          temporaryPublicStorage: true
          
      - name: Extract Key Findings
        if: always()
        run: node scripts/extract-lighthouse-findings.mjs >> $GITHUB_STEP_SUMMARY
          
      - name: Add Lighthouse Comment (PR only)
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: lighthouse
          message: |
            ## Lighthouse CI Results
            Check the [GitHub Actions run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for full Lighthouse reports.
            
            Threshold settings:
            - Performance: >= 0.75 (warn)
            - Accessibility: >= 0.85 (warn)
            - Best Practices: >= 0.75 (warn)
            - SEO: >= 0.9 (error)
